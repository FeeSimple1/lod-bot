[mypy]
# Piece 9 gradual typing.  The mypy CI job (ci.yml) enforces only the
# trees that are annotated clean today — lod_ai/util and lod_ai/board.
# Widen the CI scope as more of lod_ai/ gains annotations; this config
# stays lenient so a local `mypy lod_ai` is informative, not a wall.
ignore_missing_imports = True
warn_unused_ignores = False
