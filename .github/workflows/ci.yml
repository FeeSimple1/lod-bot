name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements-dev.txt
      - name: Unit and regression tests
        run: python -m pytest -q

  bot-clean-sweep:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements-dev.txt
      - name: Bot-only games must be clean, not merely completed
        run: python -m lod_ai.tools.clean_sweep_gate --seeds 1-20

  balance-guardrail:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements-dev.txt
      - name: Winners must match the committed baseline
        run: python -m lod_ai.tools.balance_smoke --seeds 1-20

  bot-soak:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements-dev.txt
      - name: Bounded soak slice — bot-only games must stay invariant-clean
        env:
          PYTHONHASHSEED: "0"
        run: python -m lod_ai.tools.soak --games 60 --invariants --out soak_ci.jsonl

  typecheck:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - run: pip install -r requirements-dev.txt
      - name: Gradual mypy — util and board must stay type-clean
        run: python -m mypy lod_ai/util lod_ai/board
